{% extends "base.html" %}
{% block title %}Predict — FakeProfileDetect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4>Predict Profile</h4>
        <p class="small text-muted">Paste JSON matching model feature names OR use the quick fields below.</p>

        <form method="post" action="{{ url_for('predict_form') }}">
          <div class="mb-2">
            <label class="form-label">Profile JSON</label>
            <textarea name="raw_json" rows="6" class="form-control" placeholder='{"f1": 0.1, "f2": 3, "f3": 0}'></textarea>
          </div>

          <div class="row g-2">
            <div class="col"><input name="f1" class="form-control" placeholder="f1"></div>
            <div class="col"><input name="f2" class="form-control" placeholder="f2"></div>
            <div class="col"><input name="f3" class="form-control" placeholder="f3"></div>
            <div class="col"><input name="f4" class="form-control" placeholder="f4"></div>
          </div>

          <div class="mt-3">
            <button class="btn btn-primary">Run Prediction</button>
            <a class="btn btn-secondary" href="{{ url_for('user_dashboard') }}">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Login — FakeProfileDetect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Login</h3>

        <form method="post" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <button class="btn btn-primary">Login</button>
            <a href="{{ url_for('register') }}" class="small">No account? Register</a>
          </div>
        </form>

        <hr>

        <small class="text-muted">Default admin account: <strong>admin</strong> / <strong>admin</strong>. Use the Register page to create a regular user.</small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
